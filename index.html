<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Strict Content-Security-Policy — this is the technical backbone of DoxDock's
      "provably local" guarantee. connect-src 'self' means the app is forbidden
      from making any outbound network request (fetch/XHR/WebSocket) to any host
      other than its own origin. No CDNs, no analytics, no external fonts.
        - script-src 'wasm-unsafe-eval': allows WebAssembly (image compression) but not eval().
        - img-src data: blob:: canvas-generated previews and object URLs.
        - worker-src blob:: web workers (pdf.js, image compression) load from blobs.
      If you add a dependency that needs an external host, this CSP will break it
      on purpose — that is the point.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'"
    />

    <meta name="theme-color" content="#0b1018" />

    <!-- Primary SEO -->
    <title>DoxDock — Private PDF & Image Tools, 100% in Your Browser</title>
    <meta
      name="description"
      content="Free, open-source PDF & image tools that run 100% in your browser — merge, split, compress, convert, edit, and sign. No uploads, no sign-up, fully private and offline."
    />
    <meta
      name="keywords"
      content="PDF tools, image tools, merge PDF, split PDF, compress PDF, edit PDF, PDF to Word, Word to PDF, convert image, resize image, offline PDF editor, private PDF, no upload PDF, browser PDF tools, client-side, open source"
    />
    <meta name="author" content="Mithun Srinivas" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://doxdock.vercel.app/" />

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DoxDock" />
    <meta property="og:title" content="DoxDock — Private PDF & Image Tools, 100% in Your Browser" />
    <meta
      property="og:description"
      content="Free, open-source PDF & image tools that run entirely in your browser. Nothing you open is ever uploaded — no servers, no sign-up, works offline."
    />
    <meta property="og:url" content="https://doxdock.vercel.app/" />
    <meta property="og:image" content="https://doxdock.vercel.app/og.png" />
    <meta property="og:image:width" content="1723" />
    <meta property="og:image:height" content="982" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DoxDock — Private PDF & Image Tools, 100% in Your Browser" />
    <meta
      name="twitter:description"
      content="Free, open-source PDF & image tools that run entirely in your browser. No uploads, no sign-up, fully private."
    />
    <meta name="twitter:image" content="https://doxdock.vercel.app/og.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180.png" />
  </head>
  <body class="h-full">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
